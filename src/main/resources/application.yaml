server:
  port: ${PORT:8080}

spring:
  application:
    name: server

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/bucketroulette?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:bucket-roulette-hackathon-secret-key}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}

aws:
  region: ${AWS_REGION:ap-northeast-2}
  bucket: ${S3_BUCKET_NAME:bucketroulette-kuit}
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}