spring:
  application:
    name: server

  datasource:
    url: jdbc:mysql://localhost:3306/bucketroulette?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        show_sql: true
        format_sql: true
    open-in-view: false

jwt:
  secret: ${JWT_SECRET:bucket-roulette-hackathon-secret-key-1234567890}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:3600000}

aws:
  region: ap-northeast-2
  bucket: bucketroulette-kuit
  access-key: ${AWS_ACCESS_KEY}
  secret-key: ${AWS_SECRET_KEY}